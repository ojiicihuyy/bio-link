<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coklatssss - Link in Bio</title>
    <!-- Import Font Awesome untuk Logo Media Sosial Asli -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            /* Latar belakang gradasi biru tua gelap sesuai gambar */
            background: linear-gradient(180deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 60px 20px;
        }
        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        /* Avatar Profil Bulat dengan Efek Glow Halus */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .tag {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 15px;
            font-weight: 400;
        }
        /* Tombol Badge Kecil Biru di Bawah Profil */
        .badges {
            margin-bottom: 35px;
        }
        .badge {
            background: #1e3a8a;
            color: #38bdf8;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin: 0 4px;
            display: inline-block;
            border: 1px solid #2563eb;
        }
        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: left;
            margin-bottom: 15px;
            padding-left: 2px;
        }
        /* Grid 2 Kolom untuk Tombol Media Sosial */
        .links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        /* Desain Tombol Transparan / Glassmorphism */
        .link-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 22px 10px;
            text-decoration: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease-in-out;
        }
        /* Efek saat tombol disentuh/diarahkan kursor */
        .link-card:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.02);
        }
        /* Ukuran dan Jarak Ikon */
        .icon {
            font-size: 1.5rem;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        .platform-title {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .username {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 3px;
            font-weight: 400;
        }
        /* Responsif untuk HP Layar Kecil agar Menjadi 1 Kolom */
        @media (max-width: 360px) {
            .links-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Bagian Profil -->
    <!-- Ganti URL di bawah ini dengan link foto profil aslimu -->
    <img src="https://unsplash.com" alt="Profile" class="profile-img">
    <h1>Coklatssss</h1>
    <div class="tag">Content Creator</div>
    
    <!-- Tombol Badge Biru -->
    <div class="badges">
        <span class="badge">Mula</span>
        <span class="badge">Indonesia</span>
    </div>

    <div class="section-title">Social Media</div>

    <!-- Kotak Tautan Grid 2 Kolom -->
    <div class="links-grid">
        <!-- Instagram -->
        <a href="https://instagram.com" target="_blank" class="link-card">
            <i class="fa-brands fa-instagram icon"></i>
            <span class="platform-title">Instagram</span>
            <span class="username">@coklatssss</span>
        </a>

        <!-- TikTok -->
        <a href="https://tiktok.com" target="_blank" class="link-card">
            <i class="fa-brands fa-tiktok icon"></i>
            <span class="platform-title">TikTok</span>
            <span class="username">@coklatssss0</span>
        </a>

        <!-- Steam -->
        <a href="#link-steam-kamu" target="_blank" class="link-card">
            <i class="fa-brands fa-steam icon"></i>
            <span class="platform-title">Steam</span>
            <span class="username">Coklatssss</span>
        </a>

        <!-- Roblox -->
        <a href="#link-roblox-kamu" target="_blank" class="link-card">
            <i class="fa-gamepad icon"></i>
            <span class="platform-title">Roblox</span>
            <span class="username">Zlum</span>
        </a>

        <!-- GitHub -->
        <a href="https://github.com" target="_blank" class="link-card">
            <i class="fa-brands fa-github icon"></i>
            <span class="platform-title">GitHub</span>
            <span class="username">@AzisR223</span>
        </a>

        <!-- Discord -->
        <a href="#link-discord-kamu" target="_blank" class="link-card">
            <i class="fa-brands fa-discord icon"></i>
            <span class="platform-title">Discord</span>
            <span class="username">coklatssss</span>
        </a>
    </div>
</div>

</body>
